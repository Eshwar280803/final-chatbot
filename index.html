<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eshwar's AI Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-between p-4 font-sans">

  <div class="max-w-xl w-full mx-auto bg-white shadow-md rounded-lg flex flex-col h-full overflow-hidden">
    <!-- Header -->
    <div class="bg-blue-600 p-4 text-white font-bold text-center shadow-sm">
      🤖 Eshwar's RAG Assistant
    </div>

    <!-- Chat History -->
    <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50">
      <div class="bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%] text-sm">
        Hello! Ask me about Project Alpha, grading policies, or passing scores.
      </div>
    </div>

    <!-- Input Box -->
    <form id="chat-form" class="p-3 border-t flex gap-2 bg-white">
      <input id="user-input" type="text" placeholder="Type your question..." class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">Send</button>
    </form>
  </div>

  <script>
    // Hidden knowledge base (The 'RAG' textbook)
    const KNOWLEDGE_BASE = [
      "Project Alpha was launched on June 1, 2026, by a student named Alex.",
      "The grading policy states that submitting late results in a 10% penalty per day.",
      "To pass the class, students must score at least 70% overall."
    ];

    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');

    function appendMessage(text, isUser) {
      const bubble = document.createElement('div');
      bubble.className = isUser 
        ? "bg-blue-600 text-white p-3 rounded-lg max-w-[80%] ml-auto text-sm shadow-sm"
        : "bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%] text-sm shadow-sm";
      bubble.textContent = text;
      chatBox.appendChild(bubble);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = userInput.value.trim();
      if (!query) return;

      appendMessage(query, true);
      userInput.value = '';

      // RAG Retrieval Step
      let foundContext = "No matching data found.";
      for (let note of KNOWLEDGE_BASE) {
        if (note.toLowerCase().includes(query.toLowerCase().split(" ")[0])) {
          foundContext = note;
          break;
        }
      }

      appendMessage("Thinking...", false);
      const loadingBubble = chatBox.lastChild;

      try {
        const response = await fetch("https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            inputs: `<|system|>\nAnswer strictly using this context: ${foundContext}\n<|user|>\n${query}\n<|assistant|>`
          })
        });
        
        const result = await response.json();
        loadingBubble.remove();
        
        let aiAnswer = result[0]?.generated_text || "Error generating response.";
        if (aiAnswer.includes("<|assistant|>")) {
          aiAnswer = aiAnswer.split("<|assistant|>").pop().trim();
        }
        appendMessage(aiAnswer, false);
      } catch (error) {
        loadingBubble.remove();
        appendMessage("Connection error. Try asking 'Project Alpha'.", false);
      }
    });
  </script>
</body>
</html>
