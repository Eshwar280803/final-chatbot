<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eshwar's AI Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-between p-4 font-sans">

  <div class="max-w-xl w-full mx-auto bg-white shadow-md rounded-lg flex flex-col h-full overflow-hidden">
    <!-- Header -->
    <div class="bg-blue-600 p-4 text-white font-bold text-center shadow-sm">
      🚀 Eshwar's Smart Hybrid Assistant
    </div>

    <!-- Chat History -->
    <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50">
      <div class="bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%] text-sm">
        Hello! I am your advanced assistant. I can answer questions about your custom documentation, write code, or just chat about anything you like!
      </div>
    </div>

    <!-- Input Box -->
    <form id="chat-form" class="p-3 border-t flex gap-2 bg-white">
      <input id="user-input" type="text" placeholder="Ask me absolutely anything..." class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">Send</button>
    </form>
  </div>

  <script>
    // Hidden knowledge base (The 'RAG' textbook)
    const KNOWLEDGE_BASE = [
      "Project Alpha was launched on June 1, 2026, by a student named Alex.",
      "The grading policy states that submitting late results in a 10% penalty per day.",
      "To pass the class, students must score at least 70% overall."
    ];

    // Local Backup Cheat Sheet for common general questions if the online server blinks
    const LOCAL_GENERAL_ANSWERS = {
      "india": "The capital of India is New Delhi.",
      "capital": "The capital of India is New Delhi.",
      "hi": "Hello there! How can I help you today?",
      "hello": "Hi! Great to meet you. Ask me anything!",
      "name": "I am Eshwar's Smart Hybrid Assistant chatbot!",
      "who": "I am an AI assistant built by Eshwar."
    };

    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');

    function appendMessage(text, isUser) {
      const bubble = document.createElement('div');
      bubble.className = isUser 
        ? "bg-blue-600 text-white p-3 rounded-lg max-w-[80%] ml-auto text-sm shadow-sm"
        : "bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%] text-sm shadow-sm";
      bubble.textContent = text;
      chatBox.appendChild(bubble);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = userInput.value.trim();
      if (!query) return;

      appendMessage(query, true);
      userInput.value = '';

      // 🔍 1. RAG Retrieval Step: Scan custom notes
      let foundContext = "";
      let matchFound = false;
      for (let note of KNOWLEDGE_BASE) {
        if (note.toLowerCase().includes(query.toLowerCase().split(" ")[0])) {
          foundContext = note;
          matchFound = true;
          break;
        }
      }

      appendMessage("Thinking...", false);
      const loadingBubble = chatBox.lastChild;

      // 🧠 2. Smart System Prompt Builder
      let systemInstruction = "";
      if (matchFound) {
        systemInstruction = `You are a helpful AI assistant. Answer the user's query prioritizing this custom context data: ${foundContext}`;
      } else {
        systemInstruction = "You are an all-knowing, creative, and intelligent AI assistant. Answer the user's question accurately using your general knowledge pool.";
      }

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "google/gemini-2.5-flash:free",
            messages: [
              { role: "system", content: systemInstruction },
              { role: "user", content: query }
            ]
          })
        });
        
        const result = await response.json();
        loadingBubble.remove();
        
        const aiAnswer = result.choices[0]?.message?.content || "I couldn't process that response.";
        appendMessage(aiAnswer, false);
      } catch (error) {
        loadingBubble.remove();
        
        // 🛡️ Advanced Smart Fallback Protection
        let backupAnswer = "";
        
        if (matchFound) {
          // If custom data matched, use it
          backupAnswer = `[Knowledge Retrieval]: ${foundContext}`;
        } else {
          // Check if any word matches our local general facts array
          const words = query.toLowerCase().split(" ");
          for (let word of words) {
            if (LOCAL_GENERAL_ANSWERS[word]) {
              backupAnswer = `[Local Backup]: ${LOCAL_GENERAL_ANSWERS[word]}`;
              break;
            }
          }
        }

        // If it's a completely unique question and servers are busy, show a cleaner reminder
        if (!backupAnswer) {
          backupAnswer = "The online public AI server is a bit busy right now! Try asking something like 'What is the capital of India', 'Hello', or 'Project Alpha'.";
        }

        appendMessage(backupAnswer, false);
      }
    });
  </script>
</body>
</html>
